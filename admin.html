<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Gym for Beginners</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="admin.html"><i class="fas fa-shield-alt text-primary"></i> Admin Panel</a>
            <div class="d-flex">
                <a class="btn btn-outline-danger btn-sm" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i>
                    Logout</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 pb-5">
        <div id="toastContainer" class="position-fixed top-0 end-0 p-3" style="z-index: 1050;"></div>

        <div class="row mb-5">
            <div class="col-md-4 mb-3">
                <div class="card stat-card shadow">
                    <i class="fas fa-users"></i>
                    <h2 id="statUsers">0</h2>
                    <p class="mb-0">Total Users</p>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card stat-card shadow">
                    <i class="fas fa-dumbbell"></i>
                    <h2 id="statWorkouts">0</h2>
                    <p class="mb-0">Total Workouts</p>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card stat-card shadow">
                    <i class="fas fa-check-circle"></i>
                    <h2 id="statCompletions">0</h2>
                    <p class="mb-0">Workout Completions</p>
                </div>
            </div>
        </div>

        <div class="row mb-5">
            <div class="col-lg-4 mb-4">
                <div class="card p-4 h-100 shadow">
                    <h4 class="mb-4"><i class="fas fa-plus-circle text-primary"></i> Add Workout</h4>
                    <form id="addWorkoutForm">
                        <div class="mb-3">
                            <input type="text" name="title" class="form-control" placeholder="Workout Title" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <select name="category_id" class="form-select" required>
                                    <option value="1">Cardio</option>
                                    <option value="2">Strength</option>
                                    <option value="3">Flexibility</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <select name="difficulty" class="form-select" required>
                                    <option value="Beginner">Beginner</option>
                                    <option value="Intermediate">Intermediate</option>
                                    <option value="Advanced">Advanced</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <textarea name="description" class="form-control" rows="2" placeholder="Brief Description"
                                required></textarea>
                        </div>
                        <div class="mb-3">
                            <textarea name="instructions" class="form-control" rows="3" placeholder="Instructions"
                                required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Publish</button>
                    </form>
                </div>
            </div>
            <div class="col-lg-8 mb-4">
                <div class="card p-4 h-100 shadow" style="overflow-x: auto;">
                    <h4 class="mb-4"><i class="fas fa-list-alt text-primary"></i> Manage Workouts</h4>
                    <table class="table table-dark table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Difficulty</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="adminWorkoutsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card p-4 shadow" style="overflow-x: auto;">
                    <h4 class="mb-4"><i class="fas fa-user-cog text-primary"></i> Manage Users</h4>
                    <table class="table table-dark table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Joined Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editWorkoutModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Workout</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="editWorkoutForm">
                    <div class="modal-body">
                        <input type="hidden" name="workout_id" id="edit_workout_id">
                        <div class="mb-3"><input type="text" name="title" id="edit_title" class="form-control" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <select name="category_id" id="edit_category_id" class="form-select" required>
                                    <option value="1">Cardio</option>
                                    <option value="2">Strength</option>
                                    <option value="3">Flexibility</option>
                                </select>
                            </div>
                            <div class="col-6 mb-3">
                                <select name="difficulty" id="edit_difficulty" class="form-select" required>
                                    <option value="Beginner">Beginner</option>
                                    <option value="Intermediate">Intermediate</option>
                                    <option value="Advanced">Advanced</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3"><textarea name="description" id="edit_description" class="form-control"
                                rows="2" required></textarea></div>
                        <div class="mb-3"><textarea name="instructions" id="edit_instructions" class="form-control"
                                rows="4" required></textarea></div>
                    </div>
                    <div class="modal-footer"><button type="submit" class="btn btn-primary w-100">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="userHistoryModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="historyModalLabel">User History</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <table class="table table-dark table-striped">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Workout Title</th>
                                <th>Difficulty</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
