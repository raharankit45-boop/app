<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Gym for Beginners</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html"><i class="fas fa-dumbbell text-primary"></i> Gym for Beginners</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#dashNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="dashNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item"><a class="nav-link" href="#" data-bs-toggle="modal"
                            data-bs-target="#profileModal"><i class="fas fa-user-circle"></i> Profile</a></li>
                    <li class="nav-item"><a class="btn btn-outline-danger ms-3 btn-sm" href="#" id="logoutBtn"><i
                                class="fas fa-sign-out-alt"></i> Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div id="toastContainer" class="position-fixed top-0 end-0 p-3" style="z-index: 1050;"></div>

        <div class="row mb-4">
            <div class="col-md-3 mb-3">
                <div class="card p-3 h-100 text-center shadow">
                    <h6 class="text-uppercase mb-2">Total Unique Workouts Completed</h6>
                    <h2 class="text-primary mb-0" id="totalWorkoutsCount"><i class="fas fa-spinner fa-spin"></i></h2>
                </div>
            </div>
            <div class="col-md-5 mb-3">
                <div class="card p-3 h-100 shadow">
                    <h6 class="text-uppercase mb-3 text-center">Your 7-Day Activity Streak</h6>
                    <div class="d-flex justify-content-between align-items-center px-3" id="streakContainer">
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card p-3 h-100 shadow">
                    <h6 class="text-uppercase mb-3">Category Breakdown</h6>
                    <div id="categoryStatsContainer">
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-end mb-4 border-bottom border-secondary pb-3">
                    <div>
                        <h3 class="mb-1"><i class="fas fa-fire text-primary"></i> Browse Workouts</h3>
                        <p class="mb-0"><i class="far fa-calendar-check"></i> Marking for: <strong
                                id="currentDateDisplay" class="text-white"></strong></p>
                    </div>
                    <select id="difficultyFilter" class="form-select w-auto">
                        <option value="All">All Difficulties</option>
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Advanced">Advanced</option>
                    </select>
                </div>
                <div class="row" id="workoutsContainer">
                </div>
            </div>

            <div class="col-lg-4">
                <h3 class="mb-4"><i class="fas fa-chart-line text-primary"></i> Recent History</h3>
                <div class="card p-3 shadow">
                    <div id="progressContainer">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="instructionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="instructionModalLabel"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="instructionBody">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="profileModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-user-cog text-primary"></i> My Profile</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="text-center mb-4">
                        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-2"
                            style="width: 80px; height: 80px; font-size: 2rem;">
                            <i class="fas fa-user"></i>
                        </div>
                        <h4 id="profileName" class="mb-0"></h4>
                        <p id="profileEmail" class="text-muted"></p>
                    </div>

                    <ul class="nav nav-tabs border-secondary mb-3" id="profileTabs" role="tablist">
                        <li class="nav-item" role="presentation"><button
                                class="nav-link active bg-transparent text-white" data-bs-toggle="tab"
                                data-bs-target="#securityTab" type="button" role="tab">Security Q.</button></li>
                        <li class="nav-item" role="presentation"><button class="nav-link bg-transparent text-white"
                                data-bs-toggle="tab" data-bs-target="#passwordTab" type="button"
                                role="tab">Password</button></li>
                    </ul>
                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="securityTab" role="tabpanel">
                            <form id="profileSecurityForm">
                                <p class="small mb-2">Current Question: <strong id="currentSQ"
                                        class="text-white"></strong></p>
                                <div class="mb-2">
                                    <select name="security_question" class="form-select form-select-sm" required>
                                        <option value="">Select New Question...</option>
                                        <option value="q1">What was your childhood nickname?</option>
                                        <option value="q2">What is the name of your favorite pet?</option>
                                        <option value="q3">What city were you born in?</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <input type="text" name="security_answer" class="form-control form-control-sm"
                                        placeholder="New Answer" required>
                                </div>
                                <button type="submit" class="btn btn-sm btn-primary w-100">Update Security</button>
                            </form>
                        </div>
                        <div class="tab-pane fade" id="passwordTab" role="tabpanel">
                            <form id="profilePasswordForm">
                                <div class="mb-2"><input type="password" name="old_password"
                                        class="form-control form-control-sm" placeholder="Current Password" required>
                                </div>
                                <div class="mb-3"><input type="password" name="new_password"
                                        class="form-control form-control-sm" placeholder="New Password" required></div>
                                <button type="submit" class="btn btn-sm btn-warning w-100">Change Password</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
