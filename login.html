<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gym for Beginners</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-dumbbell"></i> Gym for Beginners</a>
            <div class="d-flex">
                <a class="btn btn-outline-light" href="register.html">Sign Up</a>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="card auth-card shadow-lg">
            <h3 class="text-center mb-4"><i class="fas fa-sign-in-alt text-primary"></i> Welcome Back</h3>
            <div id="toastContainer" class="mb-3"></div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label" for="remember">Stay logged in</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 mt-3">Log In</button>
            </form>
            <div class="text-center mt-4">
                <a href="reset-password.html" class="small">Forgot password?</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
