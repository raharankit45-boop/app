<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Gym for Beginners</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-dumbbell"></i> Gym for Beginners</a>
            <div class="d-flex">
                <a class="btn btn-outline-light" href="login.html">Login</a>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="card auth-card shadow-lg" style="max-width: 600px;">
            <h3 class="text-center mb-4"><i class="fas fa-user-plus text-primary"></i> Create Account</h3>
            <div id="toastContainer" class="mb-3"></div>
            <form id="registerForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" name="password_confirm" class="form-control" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Security Question</label>
                    <select name="security_question" class="form-select" required>
                        <option value="">Select a question...</option>
                        <option value="q1">What was your childhood nickname?</option>
                        <option value="q2">What is the name of your favorite pet?</option>
                        <option value="q3">What city were you born in?</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label">Security Answer</label>
                    <input type="text" name="security_answer" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Register Now</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
