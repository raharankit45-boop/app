<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Gym for Beginners</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-dumbbell text-primary"></i> Gym for Beginners</a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="card auth-card shadow-lg">
            <h3 class="text-center mb-4"><i class="fas fa-unlock-alt text-primary"></i> Reset Password</h3>
            <div id="toastContainer" class="mb-3"></div>

            <form id="standaloneResetForm">
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Security Question</label>
                    <select name="security_question" class="form-select" required>
                        <option value="">Select your question...</option>
                        <option value="q1">What was your childhood nickname?</option>
                        <option value="q2">What is the name of your favorite pet?</option>
                        <option value="q3">What city were you born in?</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Security Answer</label>
                    <input type="text" name="security_answer" class="form-control" required>
                </div>
                <hr class="border-secondary">
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password" name="new_password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Reset Password</button>
            </form>

            <div class="text-center mt-4">
                <a href="login.html" class="small text-muted">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
